
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hosam ❤️ Jaydaa</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', 'Tajawal', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    text-align: center;
    overflow-x: hidden;
    min-height: 100vh;
    color: #ffffff;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* LOGIN */
#login {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    background: #111111;
}

#login h1 {
    font-family: 'Tajawal', sans-serif;
    font-weight: 900;
    color: #ffffff;
    margin-bottom: 25px;
    text-shadow: 0 2px 10px rgba(255,255,255,0.2);
    font-size: 28px; /* مضبوط للموبايل */
}

input {
    font-family: 'Cairo', sans-serif;
    padding: 14px;
    border-radius: 25px;
    border: 2px solid #ffffff;
    background: transparent;
    color: #ffffff;
    text-align: center;
    font-size: 16px;
    outline: none;
    width: 85%;
    max-width: 280px;
    box-sizing: border-box;
}

input::placeholder {
    color: #aaa;
}

button {
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    margin-top: 20px;
    padding: 12px 40px;
    border: none;
    border-radius: 25px;
    background: #ffffff;
    color: #111111;
    font-size: 17px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #eeeeee;
}

/* HEARTS */
.heart {
    position: absolute;
    color: #ff1e56;
    pointer-events: none;
    z-index: 999;
    animation: float var(--speed) linear forwards;
}

@keyframes float {
    0% { transform: translateY(105vh) scale(0); opacity: 0; }
    10% { opacity: 0.9; }
    90% { opacity: 0.9; }
    100% { transform: translateY(-10vh) scale(var(--size)); opacity: 0; }
}

/* WAHSH */
#wahsh {
    display: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 35px; /* أنسب للموبايل بدلا من 45 */
    font-weight: 900;
    color: #ffffff;
    background: #111111;
    height: 100vh;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

/* MAIN */
#main {
    display: none;
    padding: 25px 15px; /* تقليل الهوامش الجانبية للموبايل */
    box-sizing: border-box;
}

.msg {
    font-size: 26px; /* حجم متناسق مع شاشات الموبايل */
    font-weight: 900;
    color: #ffffff;
    margin-bottom: 25px;
    text-shadow: 0 2px 10px rgba(255, 255, 255, 0.3);
}

/* تصميم العداد الزمني الكبير والمميز */
.counter-title {
    font-size: 18px; /* حجم مرن */
    color: #eeeeee;
    margin-bottom: 15px;
    font-weight: 700;
    padding: 0 10px;
}

.counter-container {
    display: flex;
    justify-content: center;
    gap: 8px; /* تقليل الفراغات ليناسب العرض */
    width: 100%;
    max-width: 450px;
    margin: 0 auto 35px auto;
    background: rgba(0, 0, 0, 0.6);
    padding: 15px 10px; /* تقليل الحشو */
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-sizing: border-box;
}

.counter-box {
    background: #ffffff;
    color: #111111;
    padding: 12px 5px;
    border-radius: 12px;
    flex: 1; /* يضمن توزيع البوكسات بالتساوي ومتقفلش على بعض */
    max-width: 90px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

.counter-number {
    font-size: 24px; /* حجم خط مرن للموبايل عشان الأرقام الكبيرة متطلعش بره */
    font-weight: 900;
    display: block;
}

.counter-label {
    font-size: 12px;
    font-weight: 700;
}

/* الكروت */
.card {
    margin: 25px auto;
    background: #ffffff;
    padding: 12px;
    border-radius: 20px;
    width: 90%; /* يعتمد على عرض الشاشة */
    max-width: 340px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    border: 1px solid #dddddd;
    box-sizing: border-box;
}

.card img {
    width: 100%;
    border-radius: 15px;
    display: block;
    height: auto; /* يحافظ على أبعاد الصورة الأصلية */
}

.cap {
    margin-top: 14px;
    font-size: 18px;
    font-weight: 700;
    color: #111111;
}

/* الخاتمة */
.end {
    margin-top: 40px;
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.6;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 20px;
    padding: 20px;
    width: 90%;
    max-width: 550px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-sizing: border-box;
}

/* كلمة خلصنا الكبيرة */
.finish-text {
    font-family: 'Tajawal', sans-serif;
    font-size: 45px; /* تم تقليلها لتناسب الموبايل */
    font-weight: 900;
    color: #ffffff;
    margin-top: 30px;
    margin-bottom: 30px;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    animation: pulse 2s infinite alternate;
}

@keyframes pulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.05); }
}
</style>
</head>

<body>

<div id="login">
    <h1>Hosam ❤️ Jaydaa</h1>
    <input type="password" id="pass" placeholder="اكتبي الباسورد هنا يانونو...">
    <button onclick="checkPass()">دوسي هنا</button>
</div>

<div id="wahsh">وحشتيني ❤️</div>

<div id="main">

    <div class="msg">بحبك اوي يانونو ❤️</div>

    <div class="counter-title">كل ثانية معاكي هي عمر جديد.. بقالنا مع بعض: ❤️</div>
    <div class="counter-container">
        <div class="counter-box">
            <span class="counter-number" id="days">0</span>
            <span class="counter-label">يوم</span>
        </div>
        <div class="counter-box">
            <span class="counter-number" id="hours">0</span>
            <span class="counter-label">ساعة</span>
        </div>
        <div class="counter-box">
            <span class="counter-number" id="minutes">0</span>
            <span class="counter-label">دقيقة</span>
        </div>
        <div class="counter-box">
            <span class="counter-number" id="seconds">0</span>
            <span class="counter-label">ثانية</span>
        </div>
    </div>

    <div class="card">
        <img src="1.jpg.jfif" alt="أول ذكرى بينا">
        <div class="cap">أول ذكرى بينا ❤️</div>
    </div>

    <div class="card">
        <img src="2.jpg.jfif" alt="قمري">
        <div class="cap">قمري❤️</div>
    </div>

    <div class="card">
        <img src="3.jpg.jfif" alt="أحلى من القمر">
        <div class="cap">أحلى من القمر❤️</div>
    </div>

    <div class="end">
        انا بحبك اوي ياجيدا ويارب تفضلي معايا لاخر يوم في عمري❤️
    </div>

    <div class="finish-text">خلصنا ❤️</div>

    <audio id="mySong" loop preload="auto">
        <source src="music.mp3" type="audio/mp3">
    </audio>

</div>

<script>
function checkPass(){
    let pass = document.getElementById("pass").value.trim().toLowerCase();

    if(pass === "dida"){
        document.getElementById("login").style.display = "none";
        
        let song = document.getElementById("mySong");
        if(song) {
            song.muted = false;
            song.play().catch(err => {
                console.log("تنبيه المتصفح للتشغيل التلقائي:", err);
            });
        }
        
        show();
    } else {
        alert("الباسورد غلط يا نونو ❤️ جربي تاني");
    }
}

function show(){
    document.getElementById("wahsh").style.display = "flex";

    setTimeout(() => {
        document.getElementById("wahsh").style.display = "none";
        document.getElementById("main").style.display = "block";
        hearts();
        startCounter(); 
    }, 2500);
}

function startCounter() {
    const startDate = new Date("2025-06-06T00:00:00").getTime();

    setInterval(() => {
        const now = new Date().getTime();
        const difference = now - startDate;

        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((difference % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = hours;
        document.getElementById("minutes").innerText = minutes;
        document.getElementById("seconds").innerText = seconds;
    }, 1000);
}

function hearts(){
    setInterval(() => {
        let h = document.createElement("div");
        h.classList.add("heart");
        h.innerHTML = "❤️";
        h.style.left = Math.random() * 100 + "vw";
        
        let size = Math.random() * 1.5 + 0.5; 
        let speed = Math.random() * 3 + 3;    
        
        h.style.setProperty('--size', size);
        h.style.setProperty('--speed', speed + 's');
        h.style.fontSize = (size * 20) + "px";

        document.body.appendChild(h);
        
        setTimeout(() => h.remove(), speed * 1000);
    }, 350); 
}
</script>

</body>
</html>
